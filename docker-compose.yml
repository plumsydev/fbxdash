# ===========================================
# FreeboxOS Ultra Dashboard - Docker Compose
# ===========================================
#
# Always builds the image from the local source tree — `docker compose up -d`
# never pulls a pre-built image from a registry.
#
# Usage:
#   docker compose up -d --build
#   docker compose up -d            (rebuilds automatically if the image is missing)
#
# Environment variables (all optional, see .env.example):
#   DASHBOARD_PORT       - Dashboard port (default: 7505)
#   FREEBOX_HOST         - Freebox hostname (default: mafreebox.freebox.fr)
#   VITE_LOGO_DEV_TOKEN  - logo.dev API token, baked in at build time (Network page device icons)
#
# Examples:
#   DASHBOARD_PORT=8080 docker compose up -d --build
#   docker compose --env-file .env up -d --build
#
# MCP Server (optional — Claude AI integration, separate upstream project):
#   docker compose --profile mcp up -d

services:
  freebox-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_LOGO_DEV_TOKEN=${VITE_LOGO_DEV_TOKEN:-}
    container_name: freebox-dashboard
    restart: unless-stopped

    # Port mapping: host:container
    ports:
      - "${DASHBOARD_PORT:-7505}:3000"

    # Environment configuration
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FREEBOX_HOST=${FREEBOX_HOST:-mafreebox.freebox.fr}
      - FREEBOX_URL=${FREEBOX_URL:-}
      - FREEBOX_LOCAL_IP=${FREEBOX_LOCAL_IP:-192.168.1.254}
      - FREEBOX_APP_ID=${FREEBOX_APP_ID:-fr.freeboxos.dashboard}
      - FREEBOX_APP_NAME=${FREEBOX_APP_NAME:-Freebox Dashboard}
      - FREEBOX_APP_VERSION=${FREEBOX_APP_VERSION:-1.0.0}
      - FREEBOX_DEVICE_NAME=${FREEBOX_DEVICE_NAME:-Dashboard Web App}
      - FREEBOX_API_VERSION=${FREEBOX_API_VERSION:-v14}
      - FREEBOX_TOKEN_FILE=/app/data/freebox_token.json
      # Optional: Mock mode for testing different Freebox models (ultra, delta, pop, revolution)
      - MOCK_FREEBOX_MODEL=${MOCK_FREEBOX_MODEL:-}

    # Persistent storage for Freebox API token
    volumes:
      - freebox_data:/app/data

    # Network mode options:
    # Option 1: Bridge mode (default) - uses port mapping
    # Option 2: Host mode - direct network access (uncomment below)
    # network_mode: host

    # Health check (use 127.0.0.1 instead of localhost to avoid IPv6 issues)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Resource limits (optional)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 256M
    #     reservations:
    #       cpus: '0.1'
    #       memory: 128M

  # ===========================================
  # MCP Server (optional) — Claude AI integration
  # ===========================================
  # Separate upstream project, not part of this repository's source tree,
  # so it is pulled as a pre-built image rather than built locally.
  # Activate with: docker compose --profile mcp up -d
  # See: https://github.com/leto1210/mafreebox-mcpserver
  freebox-mcp:
    image: ghcr.io/leto1210/mafreebox-mcpserver:v1.5.0
    container_name: freebox-mcp
    restart: unless-stopped
    profiles:
      - mcp
    environment:
      - FREEBOX_HOST=${FREEBOX_HOST:-mafreebox.freebox.fr}
      - FREEBOX_TOKEN_FILE=/app/data/freebox_token.json
    volumes:
      - freebox_mcp_data:/app/data
    # MCP servers communicate via stdio — no ports exposed

# Named volumes for persistent token storage
volumes:
  freebox_data:
    name: freebox_dashboard_data
  freebox_mcp_data:
    name: freebox_mcp_data
